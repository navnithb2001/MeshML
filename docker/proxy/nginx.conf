worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server {
        # Cloud Run uses h2c (cleartext HTTP/2) for massive payloads
        listen 8080 http2;
        
        # Unrestrict upload sizes and stream them dynamically
        client_max_body_size 0;

        location / {
            # Proxy pass to the GKE API Gateway LoadBalancer
            proxy_pass http://34.123.95.110;
            
            # Streaming & Timeouts
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
            
            # Forward headers natively
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Crucial: WebSocket support for realtime metrics
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Disable buffering for Server-Sent Events / WebSockets
            proxy_buffering off;
        }
    }
}
