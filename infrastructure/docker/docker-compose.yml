version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: meshml-postgres
    environment:
      POSTGRES_DB: meshml
      POSTGRES_USER: meshml_user
      POSTGRES_PASSWORD: meshml_dev_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./../../database/schema:/docker-entrypoint-initdb.d
    networks:
      - meshml-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meshml_user -d meshml"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7.2-alpine
    container_name: meshml-redis
    command: redis-server --appendonly yes --requirepass meshml_redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - meshml-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: meshml-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - meshml-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Prometheus (Metrics Collection)
  prometheus:
    image: prom/prometheus:latest
    container_name: meshml-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - ./../../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - meshml-network
    depends_on:
      - postgres
      - redis

  # Grafana (Metrics Visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: meshml-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./../../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./../../monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - meshml-network
    depends_on:
      - prometheus

  # Jaeger (Distributed Tracing)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: meshml-jaeger
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: :9411
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"  # Jaeger UI
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
    networks:
      - meshml-network

  # pgAdmin (PostgreSQL Management - Optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: meshml-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@meshml.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - meshml-network
    depends_on:
      - postgres
    profiles:
      - tools

  # Redis Commander (Redis Management - Optional)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: meshml-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379:0:meshml_redis_password
    ports:
      - "8081:8081"
    networks:
      - meshml-network
    depends_on:
      - redis
    profiles:
      - tools

networks:
  meshml-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
  pgadmin_data:
