openapi: 3.0.3
info:
  title: MeshML API
  description: |
    REST API for the MeshML Distributed ML Training System.
    
    This API provides endpoints for:
    - User authentication and management
    - Group collaboration and RBAC
    - Custom model upload and validation
    - Training job submission and monitoring
    - Worker registration and management
    - Dataset upload and management
    
    ## Authentication
    All endpoints (except `/auth/*`) require JWT authentication via the `Authorization` header:
    ```
    Authorization: Bearer <jwt_token>
    ```
    
    ## Rate Limiting
    - Authenticated users: 1000 requests/hour
    - Unauthenticated: 100 requests/hour
    
    ## Pagination
    List endpoints support pagination via query parameters:
    - `page`: Page number (1-indexed, default: 1)
    - `page_size`: Items per page (default: 20, max: 100)
    
  version: 1.0.0
  contact:
    name: MeshML Team
    email: support@meshml.dev
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8000/api/v1
    description: Local development server
  - url: https://api.meshml.dev/api/v1
    description: Production server

tags:
  - name: Authentication
    description: User authentication and registration
  - name: Users
    description: User profile management
  - name: Groups
    description: Group collaboration and RBAC
  - name: Models
    description: Custom model upload and management
  - name: Datasets
    description: Dataset upload and management
  - name: Jobs
    description: Training job submission and monitoring
  - name: Workers
    description: Worker registration and health monitoring
  - name: Metrics
    description: Training metrics and statistics
  - name: System
    description: System health and status

paths:
  # ============================================================================
  # AUTHENTICATION
  # ============================================================================
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register new user
      description: Create a new user account
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      tags: [Authentication]
      summary: User login
      description: Authenticate user and receive JWT token
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh JWT token
      description: Get a new access token using refresh token
      operationId: refreshToken
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/verify-email:
    post:
      tags: [Authentication]
      summary: Verify email address
      description: Verify user email using verification token
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: Email verification token
      responses:
        '200':
          description: Email verified successfully
        '400':
          $ref: '#/components/responses/BadRequest'

  # ============================================================================
  # USERS
  # ============================================================================
  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      description: Get authenticated user's profile information
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      tags: [Users]
      summary: Update current user profile
      description: Update authenticated user's profile
      operationId: updateCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{user_id}:
    get:
      tags: [Users]
      summary: Get user by ID
      description: Get user profile by user ID (must be in same group)
      operationId: getUserById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================================
  # GROUPS
  # ============================================================================
  /groups:
    get:
      tags: [Groups]
      summary: List user's groups
      description: Get all groups the current user is a member of
      operationId: listGroups
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: List of groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      $ref: '#/components/schemas/Group'
                  pagination:
                    $ref: '#/components/schemas/PaginationInfo'

    post:
      tags: [Groups]
      summary: Create new group
      description: Create a new collaboration group
      operationId: createGroup
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreateRequest'
      responses:
        '201':
          description: Group created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
          $ref: '#/components/responses/BadRequest'

  /groups/{group_id}:
    get:
      tags: [Groups]
      summary: Get group details
      description: Get group information including members
      operationId: getGroup
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200':
          description: Group details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Groups]
      summary: Update group
      description: Update group details (owner/admin only)
      operationId: updateGroup
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupUpdateRequest'
      responses:
        '200':
          description: Group updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '403':
          $ref: '#/components/responses/Forbidden'

    delete:
      tags: [Groups]
      summary: Delete group
      description: Delete group (owner only)
      operationId: deleteGroup
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '204':
          description: Group deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /groups/{group_id}/members:
    get:
      tags: [Groups]
      summary: List group members
      description: Get all members of a group with their roles
      operationId: listGroupMembers
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: List of members
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: '#/components/schemas/GroupMember'
                  pagination:
                    $ref: '#/components/schemas/PaginationInfo'

  /groups/{group_id}/members/{user_id}/role:
    put:
      tags: [Groups]
      summary: Update member role
      description: Update a member's role (owner/admin only)
      operationId: updateMemberRole
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  $ref: '#/components/schemas/GroupRole'
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupMember'
        '403':
          $ref: '#/components/responses/Forbidden'

  /groups/{group_id}/members/{user_id}:
    delete:
      tags: [Groups]
      summary: Remove member
      description: Remove a member from the group (owner/admin only)
      operationId: removeMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: Member removed
        '403':
          $ref: '#/components/responses/Forbidden'

  /groups/{group_id}/invitations:
    get:
      tags: [Groups]
      summary: List group invitations
      description: Get all pending invitations for a group
      operationId: listInvitations
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200':
          description: List of invitations
          content:
            application/json:
              schema:
                type: object
                properties:
                  invitations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invitation'

    post:
      tags: [Groups]
      summary: Create invitation
      description: Invite user to group via email (owner/admin only)
      operationId: createInvitation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationCreateRequest'
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
        '403':
          $ref: '#/components/responses/Forbidden'

  /invitations/{token}/accept:
    post:
      tags: [Groups]
      summary: Accept invitation
      description: Accept a group invitation using token
      operationId: acceptInvitation
      security:
        - bearerAuth: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invitation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupMember'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /invitations/{token}/reject:
    post:
      tags: [Groups]
      summary: Reject invitation
      description: Reject a group invitation
      operationId: rejectInvitation
      security:
        - bearerAuth: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invitation rejected
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================================
  # MODELS
  # ============================================================================
  /models:
    get:
      tags: [Models]
      summary: List models
      description: Get all models accessible to the user
      operationId: listModels
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: group_id
          in: query
          description: Filter by group
          schema:
            type: integer
        - name: status
          in: query
          description: Filter by status
          schema:
            $ref: '#/components/schemas/ModelStatus'
      responses:
        '200':
          description: List of models
          content:
            application/json:
              schema:
                type: object
                properties:
                  models:
                    type: array
                    items:
                      $ref: '#/components/schemas/Model'
                  pagination:
                    $ref: '#/components/schemas/PaginationInfo'

    post:
      tags: [Models]
      summary: Upload model
      description: Upload a custom PyTorch model file
      operationId: uploadModel
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [group_id, name, model_file]
              properties:
                group_id:
                  type: integer
                  description: Group this model belongs to
                name:
                  type: string
                  description: Model name
                description:
                  type: string
                  description: Model description
                model_file:
                  type: string
                  format: binary
                  description: Python file containing model code
                architecture:
                  type: string
                  description: Model architecture type
      responses:
        '201':
          description: Model uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Model'
        '400':
          $ref: '#/components/responses/BadRequest'
        '413':
          description: Model file too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /models/{model_id}:
    get:
      tags: [Models]
      summary: Get model details
      description: Get model information and validation status
      operationId: getModel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ModelId'
      responses:
        '200':
          description: Model details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelDetail'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Models]
      summary: Delete model
      description: Delete a model (owner/admin only)
      operationId: deleteModel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ModelId'
      responses:
        '204':
          description: Model deleted
        '403':
          $ref: '#/components/responses/Forbidden'

  /models/{model_id}/download:
    get:
      tags: [Models]
      summary: Download model file
      description: Download the model Python file
      operationId: downloadModel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ModelId'
      responses:
        '200':
          description: Model file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================================
  # JOBS
  # ============================================================================
  /jobs:
    get:
      tags: [Jobs]
      summary: List jobs
      description: Get all jobs accessible to the user
      operationId: listJobs
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: group_id
          in: query
          description: Filter by group
          schema:
            type: integer
        - name: status
          in: query
          description: Filter by status
          schema:
            $ref: '#/components/schemas/JobStatus'
      responses:
        '200':
          description: List of jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'
                  pagination:
                    $ref: '#/components/schemas/PaginationInfo'

    post:
      tags: [Jobs]
      summary: Create job
      description: Submit a new training job
      operationId: createJob
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobCreateRequest'
      responses:
        '201':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          $ref: '#/components/responses/BadRequest'

  /jobs/{job_id}:
    get:
      tags: [Jobs]
      summary: Get job details
      description: Get detailed job information including progress
      operationId: getJob
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDetail'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Jobs]
      summary: Delete job
      description: Delete a job and all associated data
      operationId: deleteJob
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '204':
          description: Job deleted
        '403':
          $ref: '#/components/responses/Forbidden'

  /jobs/{job_id}/stop:
    post:
      tags: [Jobs]
      summary: Stop job
      description: Stop a running or paused job
      operationId: stopJob
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          $ref: '#/components/responses/BadRequest'

  /jobs/{job_id}/pause:
    post:
      tags: [Jobs]
      summary: Pause job
      description: Pause a running job
      operationId: pauseJob
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'

  /jobs/{job_id}/resume:
    post:
      tags: [Jobs]
      summary: Resume job
      description: Resume a paused job
      operationId: resumeJob
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'

  /jobs/{job_id}/metrics:
    get:
      tags: [Jobs, Metrics]
      summary: Get job metrics
      description: Get training metrics for a job
      operationId: getJobMetrics
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
        - name: start_time
          in: query
          description: Start timestamp (Unix time)
          schema:
            type: integer
        - name: end_time
          in: query
          description: End timestamp (Unix time)
          schema:
            type: integer
      responses:
        '200':
          description: Job metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobMetrics'

  /jobs/{job_id}/download/model:
    get:
      tags: [Jobs]
      summary: Download trained model
      description: Download the final trained model weights
      operationId: downloadTrainedModel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Model weights file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Job not completed
        '404':
          $ref: '#/components/responses/NotFound'

  /jobs/{job_id}/download/report:
    get:
      tags: [Jobs]
      summary: Download training report
      description: Download training report (PDF or JSON)
      operationId: downloadJobReport
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
        - name: format
          in: query
          description: Report format
          schema:
            type: string
            enum: [json, pdf]
            default: json
      responses:
        '200':
          description: Training report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobReport'
            application/pdf:
              schema:
                type: string
                format: binary

  # ============================================================================
  # WORKERS
  # ============================================================================
  /workers:
    get:
      tags: [Workers]
      summary: List workers
      description: Get all workers registered by the user
      operationId: listWorkers
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          description: Filter by status
          schema:
            $ref: '#/components/schemas/WorkerStatus'
      responses:
        '200':
          description: List of workers
          content:
            application/json:
              schema:
                type: object
                properties:
                  workers:
                    type: array
                    items:
                      $ref: '#/components/schemas/Worker'
                  pagination:
                    $ref: '#/components/schemas/PaginationInfo'

  /workers/{worker_id}:
    get:
      tags: [Workers]
      summary: Get worker details
      description: Get worker information and status
      operationId: getWorker
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkerId'
      responses:
        '200':
          description: Worker details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerDetail'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Workers]
      summary: Unregister worker
      description: Remove worker from the system
      operationId: unregisterWorker
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkerId'
      responses:
        '204':
          description: Worker unregistered
        '404':
          $ref: '#/components/responses/NotFound'

  /workers/{worker_id}/heartbeat:
    put:
      tags: [Workers]
      summary: Manual heartbeat
      description: Manually send heartbeat (for testing)
      operationId: sendHeartbeat
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: '#/components/schemas/WorkerStatus'
                cpu_usage:
                  type: number
                  format: float
                ram_usage:
                  type: number
                  format: float
      responses:
        '200':
          description: Heartbeat received
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================================
  # SYSTEM
  # ============================================================================
  /health:
    get:
      tags: [System]
      summary: Health check
      description: Check API health status
      operationId: healthCheck
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  version:
                    type: string
                    example: 1.0.0
                  timestamp:
                    type: string
                    format: date-time

  /metrics:
    get:
      tags: [System, Metrics]
      summary: System metrics
      description: Get system-wide metrics (Prometheus format)
      operationId: getSystemMetrics
      responses:
        '200':
          description: System metrics
          content:
            text/plain:
              schema:
                type: string

# ==============================================================================
# COMPONENTS
# ==============================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: integer

    GroupId:
      name: group_id
      in: path
      required: true
      schema:
        type: integer

    ModelId:
      name: model_id
      in: path
      required: true
      schema:
        type: integer

    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: integer

    WorkerId:
      name: worker_id
      in: path
      required: true
      schema:
        type: string

    Page:
      name: page
      in: query
      description: Page number (1-indexed)
      schema:
        type: integer
        minimum: 1
        default: 1

    PageSize:
      name: page_size
      in: query
      description: Items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:
    # Auth schemas
    RegisterRequest:
      type: object
      required: [email, username, password]
      properties:
        email:
          type: string
          format: email
        username:
          type: string
          minLength: 3
          maxLength: 50
        password:
          type: string
          format: password
          minLength: 8
        full_name:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          description: Token expiry in seconds
        user:
          $ref: '#/components/schemas/User'

    # User schemas
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        username:
          type: string
        full_name:
          type: string
          nullable: true
        is_active:
          type: boolean
        is_verified:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserUpdateRequest:
      type: object
      properties:
        full_name:
          type: string
        username:
          type: string

    # Group schemas
    Group:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        owner_id:
          type: integer
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    GroupDetail:
      allOf:
        - $ref: '#/components/schemas/Group'
        - type: object
          properties:
            owner:
              $ref: '#/components/schemas/User'
            member_count:
              type: integer
            members:
              type: array
              items:
                $ref: '#/components/schemas/GroupMember'

    GroupCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type: string
          maxLength: 500

    GroupUpdateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    GroupMember:
      type: object
      properties:
        user_id:
          type: integer
        user:
          $ref: '#/components/schemas/User'
        role:
          $ref: '#/components/schemas/GroupRole'
        joined_at:
          type: string
          format: date-time

    GroupRole:
      type: string
      enum: [owner, admin, member]

    Invitation:
      type: object
      properties:
        id:
          type: integer
        group_id:
          type: integer
        email:
          type: string
          format: email
        token:
          type: string
        role:
          $ref: '#/components/schemas/GroupRole'
        status:
          $ref: '#/components/schemas/InvitationStatus'
        invited_by:
          $ref: '#/components/schemas/User'
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    InvitationStatus:
      type: string
      enum: [pending, accepted, rejected, expired]

    InvitationCreateRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/GroupRole'
          default: member

    # Model schemas
    Model:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        group_id:
          type: integer
        uploaded_by_id:
          type: integer
        gcs_path:
          type: string
        status:
          $ref: '#/components/schemas/ModelStatus'
        architecture:
          type: string
          nullable: true
        framework:
          type: string
          example: pytorch
        file_size_bytes:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ModelDetail:
      allOf:
        - $ref: '#/components/schemas/Model'
        - type: object
          properties:
            uploaded_by:
              $ref: '#/components/schemas/User'
            validation_errors:
              type: array
              items:
                type: string
            metadata:
              type: object
              additionalProperties: true

    ModelStatus:
      type: string
      enum: [uploading, validating, ready, failed, deprecated]

    # Job schemas
    Job:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        group_id:
          type: integer
        model_id:
          type: integer
        dataset_path:
          type: string
        status:
          $ref: '#/components/schemas/JobStatus'
        progress:
          type: number
          format: float
          minimum: 0
          maximum: 100
        current_epoch:
          type: integer
        total_epochs:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true

    JobDetail:
      allOf:
        - $ref: '#/components/schemas/Job'
        - type: object
          properties:
            model:
              $ref: '#/components/schemas/Model'
            config:
              type: object
              additionalProperties: true
            workers_assigned:
              type: integer
            batches_completed:
              type: integer
            batches_total:
              type: integer
            current_metrics:
              type: object
              properties:
                loss:
                  type: number
                  format: float
                accuracy:
                  type: number
                  format: float
                learning_rate:
                  type: number
                  format: float

    JobCreateRequest:
      type: object
      required: [name, group_id, model_id, dataset_path, total_epochs]
      properties:
        name:
          type: string
        group_id:
          type: integer
        model_id:
          type: integer
        dataset_path:
          type: string
          description: GCS path to dataset
        total_epochs:
          type: integer
          minimum: 1
        config:
          type: object
          additionalProperties: true
          description: Training configuration (learning_rate, batch_size, etc.)

    JobStatus:
      type: string
      enum: [pending, validating, running, paused, completed, failed, cancelled]

    JobMetrics:
      type: object
      properties:
        job_id:
          type: integer
        time_series:
          type: array
          items:
            $ref: '#/components/schemas/MetricTimeSeries'
        statistics:
          type: object
          properties:
            avg_loss:
              type: number
              format: float
            best_accuracy:
              type: number
              format: float
            total_samples:
              type: integer
            total_training_time_seconds:
              type: integer

    MetricTimeSeries:
      type: object
      properties:
        metric_name:
          type: string
        points:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
                format: date-time
              value:
                type: number
                format: float
              epoch:
                type: integer
              batch:
                type: integer

    JobReport:
      type: object
      properties:
        job_id:
          type: integer
        job_name:
          type: string
        status:
          $ref: '#/components/schemas/JobStatus'
        duration_seconds:
          type: integer
        total_epochs:
          type: integer
        final_metrics:
          type: object
          additionalProperties: true
        training_history:
          type: array
          items:
            type: object
            properties:
              epoch:
                type: integer
              loss:
                type: number
              accuracy:
                type: number
        worker_statistics:
          type: array
          items:
            type: object
            properties:
              worker_id:
                type: string
              batches_completed:
                type: integer
              avg_batch_time:
                type: number

    # Worker schemas
    Worker:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        user_id:
          type: integer
        worker_type:
          $ref: '#/components/schemas/WorkerType'
        status:
          $ref: '#/components/schemas/WorkerStatus'
        capabilities:
          type: object
          additionalProperties: true
        ip_address:
          type: string
        last_heartbeat:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    WorkerDetail:
      allOf:
        - $ref: '#/components/schemas/Worker'
        - type: object
          properties:
            current_job_id:
              type: integer
              nullable: true
            batches_completed:
              type: integer
            avg_batch_time_seconds:
              type: number
              format: float

    WorkerType:
      type: string
      enum: [python, cpp, javascript]

    WorkerStatus:
      type: string
      enum: [online, offline, busy, error]

    # Common schemas
    PaginationInfo:
      type: object
      properties:
        total_count:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              issue:
                type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: UNAUTHORIZED
            message: Invalid or expired token

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: FORBIDDEN
            message: Insufficient permissions

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: NOT_FOUND
            message: Resource not found

    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: CONFLICT
            message: Email already registered

security:
  - bearerAuth: []
