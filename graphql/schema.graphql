# MeshML GraphQL Schema
# Real-time Metrics and Dashboard API
# Version: 1.0.0
# Last Updated: March 4, 2026

"""
Root Query type for fetching data
"""
type Query {
  # Job Queries
  job(id: ID!): Job
  jobs(
    groupId: ID
    status: JobStatus
    limit: Int = 20
    offset: Int = 0
  ): JobConnection!
  
  # Worker Queries
  worker(id: ID!): Worker
  workers(
    groupId: ID
    status: WorkerStatus
    type: WorkerType
    limit: Int = 50
    offset: Int = 0
  ): WorkerConnection!
  
  # Group Queries
  group(id: ID!): Group
  myGroups(limit: Int = 20, offset: Int = 0): GroupConnection!
  
  # Metrics Queries
  jobMetrics(
    jobId: ID!
    startTime: DateTime
    endTime: DateTime
    interval: TimeInterval = MINUTE
  ): [MetricPoint!]!
  
  workerMetrics(
    workerId: ID!
    startTime: DateTime
    endTime: DateTime
    interval: TimeInterval = MINUTE
  ): [SystemMetricPoint!]!
  
  aggregatedMetrics(
    jobId: ID!
    metricType: MetricType!
  ): AggregatedMetrics!
  
  # System Queries
  systemHealth: SystemHealth!
  activeJobs: Int!
  activeWorkers: Int!
}

"""
Root Mutation type for modifying data
"""
type Mutation {
  # Job Mutations
  createJob(input: CreateJobInput!): Job!
  stopJob(jobId: ID!): Job!
  pauseJob(jobId: ID!): Job!
  resumeJob(jobId: ID!): Job!
  deleteJob(jobId: ID!): Boolean!
  
  # Worker Mutations
  registerWorker(input: RegisterWorkerInput!): Worker!
  unregisterWorker(workerId: ID!): Boolean!
  
  # Group Mutations
  createGroup(input: CreateGroupInput!): Group!
  updateGroup(groupId: ID!, input: UpdateGroupInput!): Group!
  deleteGroup(groupId: ID!): Boolean!
  inviteMember(groupId: ID!, email: String!, role: GroupRole = MEMBER): Invitation!
  removeMember(groupId: ID!, userId: ID!): Boolean!
  updateMemberRole(groupId: ID!, userId: ID!, role: GroupRole!): GroupMember!
  
  # Metrics Mutations
  reportMetrics(input: MetricsReportInput!): Boolean!
}

"""
Root Subscription type for real-time updates
"""
type Subscription {
  # Job Subscriptions
  jobUpdated(jobId: ID!): Job!
  jobMetricsUpdated(jobId: ID!): MetricUpdate!
  jobStatusChanged(jobId: ID!): JobStatusUpdate!
  
  # Worker Subscriptions
  workerStatusChanged(workerId: ID): WorkerStatusUpdate!
  workersInGroup(groupId: ID!): [Worker!]!
  
  # Group Subscriptions
  groupJobsUpdated(groupId: ID!): Job!
  
  # System Subscriptions
  systemMetricsUpdated: SystemMetrics!
  batchCompleted(jobId: ID!): BatchCompletion!
}

# ============================================================================
# Core Types
# ============================================================================

"""
Training Job
"""
type Job {
  id: ID!
  name: String!
  description: String
  groupId: ID!
  group: Group!
  
  # Model Information
  modelId: ID!
  model: Model!
  modelUrl: String!
  
  # Dataset Information
  datasetUrl: String!
  totalBatches: Int!
  completedBatches: Int!
  failedBatches: Int!
  
  # Job Configuration
  config: JobConfig!
  
  # Status
  status: JobStatus!
  progress: Float!
  currentEpoch: Int!
  totalEpochs: Int!
  
  # Performance Metrics
  currentLoss: Float
  currentAccuracy: Float
  bestAccuracy: Float
  bestLoss: Float
  
  # Worker Assignment
  assignedWorkers: [Worker!]!
  workerCount: Int!
  
  # Timing
  createdAt: DateTime!
  startedAt: DateTime
  completedAt: DateTime
  estimatedCompletion: DateTime
  duration: Int # seconds
  
  # Results
  finalAccuracy: Float
  finalLoss: Float
  modelOutputUrl: String
  reportUrl: String
  
  # User
  createdBy: User!
  
  # Real-time Metrics
  liveMetrics: [MetricPoint!]!
  systemMetrics: [SystemMetricPoint!]!
}

"""
Worker (Student Device)
"""
type Worker {
  id: ID!
  userId: ID!
  user: User!
  
  # Worker Type
  type: WorkerType!
  version: String!
  
  # Capabilities
  capabilities: WorkerCapabilities!
  
  # Status
  status: WorkerStatus!
  currentJobId: ID
  currentJob: Job
  currentBatchId: String
  
  # Performance
  batchesCompleted: Int!
  totalComputeTime: Int! # seconds
  averageBatchTime: Float # seconds
  
  # Resources
  cpuUsage: Float # percentage
  memoryUsage: Float # percentage
  gpuUsage: Float # percentage
  
  # Health
  lastHeartbeat: DateTime!
  consecutiveFailures: Int!
  
  # Timing
  registeredAt: DateTime!
  lastActiveAt: DateTime!
}

"""
Group (Collaboration Unit)
"""
type Group {
  id: ID!
  name: String!
  description: String
  ownerId: ID!
  owner: User!
  
  # Members
  members: [GroupMember!]!
  memberCount: Int!
  invitations: [Invitation!]!
  
  # Jobs
  jobs: [Job!]!
  activeJobsCount: Int!
  totalJobsCount: Int!
  
  # Workers
  activeWorkers: [Worker!]!
  activeWorkerCount: Int!
  
  # Statistics
  totalComputeHours: Float!
  totalJobsCompleted: Int!
  
  # Settings
  settings: GroupSettings!
  
  # Status
  isActive: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime
}

"""
User
"""
type User {
  id: ID!
  email: String!
  username: String!
  fullName: String
  
  # Profile
  avatarUrl: String
  bio: String
  
  # Status
  isActive: Boolean!
  isVerified: Boolean!
  
  # Statistics
  groupsCount: Int!
  workersCount: Int!
  jobsCreated: Int!
  totalComputeContributed: Float! # hours
  
  # Timestamps
  createdAt: DateTime!
  lastLoginAt: DateTime
}

"""
Model
"""
type Model {
  id: ID!
  name: String!
  description: String
  groupId: ID!
  group: Group!
  
  # Model Details
  architecture: ModelArchitecture!
  framework: String! # "pytorch", "tensorflow"
  version: String!
  
  # File Information
  fileUrl: String!
  fileSize: Int! # bytes
  checksum: String!
  
  # Validation
  status: ModelStatus!
  validationErrors: [String!]
  
  # Usage
  jobsCount: Int!
  
  # Metadata
  uploadedBy: User!
  createdAt: DateTime!
  updatedAt: DateTime
}

# ============================================================================
# Metrics Types
# ============================================================================

"""
Training Metric Point (time-series)
"""
type MetricPoint {
  timestamp: DateTime!
  jobId: ID!
  workerId: ID
  batchId: String
  epoch: Int!
  
  # Training Metrics
  loss: Float!
  accuracy: Float
  learningRate: Float
  
  # Performance
  samplesProcessed: Int!
  batchTime: Float # seconds
  throughput: Float # samples/second
  
  # Gradients
  gradientNorm: Float
  weightNorm: Float
}

"""
System Resource Metric Point
"""
type SystemMetricPoint {
  timestamp: DateTime!
  workerId: ID!
  
  # CPU
  cpuUsage: Float! # percentage
  cpuTemp: Float # celsius
  
  # Memory
  memoryUsed: Int! # bytes
  memoryTotal: Int! # bytes
  memoryUsage: Float! # percentage
  
  # GPU
  gpuUsage: Float # percentage
  gpuMemoryUsed: Int # bytes
  gpuMemoryTotal: Int # bytes
  gpuTemp: Float # celsius
  
  # Network
  networkSent: Int # bytes
  networkReceived: Int # bytes
  
  # Disk
  diskUsage: Float # percentage
}

"""
Aggregated Metrics
"""
type AggregatedMetrics {
  jobId: ID!
  metricType: MetricType!
  
  # Statistical Aggregations
  min: Float!
  max: Float!
  mean: Float!
  median: Float!
  stdDev: Float!
  
  # Percentiles
  p25: Float!
  p50: Float!
  p75: Float!
  p95: Float!
  p99: Float!
  
  # Count
  sampleCount: Int!
  
  # Time Range
  startTime: DateTime!
  endTime: DateTime!
}

"""
Real-time Metric Update (for subscriptions)
"""
type MetricUpdate {
  jobId: ID!
  epoch: Int!
  batchesCompleted: Int!
  
  # Latest Metrics
  latestLoss: Float!
  latestAccuracy: Float
  
  # Moving Averages
  avgLoss: Float!
  avgAccuracy: Float
  
  # Progress
  progress: Float!
  estimatedTimeRemaining: Int # seconds
  
  # Worker Stats
  activeWorkers: Int!
  avgWorkerThroughput: Float # samples/second
  
  timestamp: DateTime!
}

"""
Job Status Update Event
"""
type JobStatusUpdate {
  jobId: ID!
  oldStatus: JobStatus!
  newStatus: JobStatus!
  reason: String
  timestamp: DateTime!
}

"""
Worker Status Update Event
"""
type WorkerStatusUpdate {
  workerId: ID!
  oldStatus: WorkerStatus!
  newStatus: WorkerStatus!
  jobId: ID
  reason: String
  timestamp: DateTime!
}

"""
Batch Completion Event
"""
type BatchCompletion {
  jobId: ID!
  batchId: String!
  workerId: ID!
  epoch: Int!
  
  # Metrics
  loss: Float!
  accuracy: Float
  samplesProcessed: Int!
  processingTime: Float! # seconds
  
  # Progress
  completedBatches: Int!
  totalBatches: Int!
  progress: Float!
  
  timestamp: DateTime!
}

"""
System Health Status
"""
type SystemHealth {
  status: HealthStatus!
  version: String!
  uptime: Int! # seconds
  
  # Service Health
  services: [ServiceHealth!]!
  
  # Database
  databaseConnections: Int!
  databaseLatency: Float # milliseconds
  
  # Cache
  cacheHitRate: Float # percentage
  cacheMemoryUsage: Float # percentage
  
  # Queue
  queueDepth: Int!
  queueLatency: Float # milliseconds
  
  timestamp: DateTime!
}

"""
Individual Service Health
"""
type ServiceHealth {
  name: String!
  status: HealthStatus!
  latency: Float # milliseconds
  errorRate: Float # percentage
  lastCheck: DateTime!
}

"""
System-wide Metrics
"""
type SystemMetrics {
  timestamp: DateTime!
  
  # Jobs
  totalJobs: Int!
  activeJobs: Int!
  queuedJobs: Int!
  completedJobs: Int!
  failedJobs: Int!
  
  # Workers
  totalWorkers: Int!
  activeWorkers: Int!
  idleWorkers: Int!
  offlineWorkers: Int!
  
  # Performance
  totalThroughput: Float! # samples/second
  avgBatchTime: Float! # seconds
  
  # Resources
  totalCpuUsage: Float! # percentage
  totalMemoryUsage: Float! # percentage
  totalGpuUsage: Float! # percentage
  
  # Network
  totalBandwidthUsed: Int! # bytes/second
}

# ============================================================================
# Nested Types
# ============================================================================

"""
Job Configuration
"""
type JobConfig {
  # Training Hyperparameters
  learningRate: Float!
  batchSize: Int!
  optimizer: String!
  lossFunction: String!
  
  # Training Control
  totalEpochs: Int!
  validationSplit: Float
  earlyStopping: Boolean!
  earlyStoppingPatience: Int
  
  # Advanced Settings
  gradientClipping: Float
  weightDecay: Float
  momentum: Float
  mixedPrecision: Boolean!
  
  # Data Augmentation
  dataAugmentation: Boolean!
  augmentationConfig: JSON
  
  # Distributed Training
  staleness: Int # max staleness for async updates
  aggregationMethod: String! # "mean", "median", "trimmed_mean"
  
  # Resources
  preferredWorkerType: WorkerType
  minWorkers: Int
  maxWorkers: Int
  
  # Checkpointing
  checkpointInterval: Int # epochs
  saveTopK: Int # save top K models by accuracy
}

"""
Worker Capabilities
"""
type WorkerCapabilities {
  # Compute
  cpuCores: Int!
  cpuModel: String!
  totalMemory: Int! # bytes
  
  # GPU
  hasGpu: Boolean!
  gpuCount: Int!
  gpuModel: String
  gpuMemory: Int # bytes per GPU
  
  # Framework Support
  supportsPyTorch: Boolean!
  supportsTensorFlow: Boolean!
  supportsOnnx: Boolean!
  
  # Precision
  supportsFp16: Boolean!
  supportsFp32: Boolean!
  supportsBf16: Boolean!
  
  # Compute Type
  computeType: String! # "CUDA", "Metal", "WebGPU", "CPU"
  
  # Performance Estimate
  estimatedThroughput: Float # samples/second
}

"""
Group Settings
"""
type GroupSettings {
  maxMembers: Int!
  requireApproval: Boolean!
  computeSharingEnabled: Boolean!
  allowPublicJoin: Boolean!
  defaultMemberRole: GroupRole!
  
  # Resource Limits
  maxConcurrentJobs: Int!
  maxJobDuration: Int # seconds
  maxDatasetSize: Int # bytes
  
  # Notifications
  notifyOnJobComplete: Boolean!
  notifyOnJobFailed: Boolean!
  notifyOnWorkerOffline: Boolean!
}

"""
Group Member
"""
type GroupMember {
  id: ID!
  userId: ID!
  user: User!
  groupId: ID!
  group: Group!
  
  role: GroupRole!
  status: MemberStatus!
  
  # Contribution
  computeContributed: Float! # hours
  jobsCreated: Int!
  workersRegistered: Int!
  
  # Timestamps
  joinedAt: DateTime!
  lastActiveAt: DateTime
}

"""
Group Invitation
"""
type Invitation {
  id: ID!
  groupId: ID!
  group: Group!
  
  inviterId: ID!
  inviter: User!
  
  inviteeEmail: String!
  invitee: User # null if not yet registered
  
  role: GroupRole!
  status: InvitationStatus!
  
  # Token
  token: String!
  
  # Timestamps
  createdAt: DateTime!
  expiresAt: DateTime!
  acceptedAt: DateTime
}

# ============================================================================
# Input Types
# ============================================================================

"""
Create Job Input
"""
input CreateJobInput {
  name: String!
  description: String
  groupId: ID!
  modelId: ID!
  datasetUrl: String!
  
  # Training Configuration
  totalEpochs: Int!
  learningRate: Float!
  batchSize: Int!
  optimizer: String! = "adam"
  lossFunction: String! = "cross_entropy"
  
  # Optional Advanced Config
  config: JobConfigInput
}

"""
Job Configuration Input
"""
input JobConfigInput {
  validationSplit: Float
  earlyStopping: Boolean = false
  earlyStoppingPatience: Int
  gradientClipping: Float
  weightDecay: Float
  momentum: Float
  mixedPrecision: Boolean = false
  dataAugmentation: Boolean = false
  augmentationConfig: JSON
  staleness: Int = 5
  aggregationMethod: String = "mean"
  preferredWorkerType: WorkerType
  minWorkers: Int
  maxWorkers: Int
  checkpointInterval: Int
  saveTopK: Int = 1
}

"""
Register Worker Input
"""
input RegisterWorkerInput {
  type: WorkerType!
  version: String!
  capabilities: WorkerCapabilitiesInput!
}

"""
Worker Capabilities Input
"""
input WorkerCapabilitiesInput {
  cpuCores: Int!
  cpuModel: String!
  totalMemory: Int!
  hasGpu: Boolean!
  gpuCount: Int = 0
  gpuModel: String
  gpuMemory: Int
  supportsPyTorch: Boolean = true
  supportsTensorFlow: Boolean = false
  supportsOnnx: Boolean = false
  supportsFp16: Boolean = false
  supportsFp32: Boolean = true
  supportsBf16: Boolean = false
  computeType: String!
  estimatedThroughput: Float
}

"""
Create Group Input
"""
input CreateGroupInput {
  name: String!
  description: String
  settings: GroupSettingsInput
}

"""
Update Group Input
"""
input UpdateGroupInput {
  name: String
  description: String
  settings: GroupSettingsInput
}

"""
Group Settings Input
"""
input GroupSettingsInput {
  maxMembers: Int
  requireApproval: Boolean
  computeSharingEnabled: Boolean
  allowPublicJoin: Boolean
  defaultMemberRole: GroupRole
  maxConcurrentJobs: Int
  maxJobDuration: Int
  maxDatasetSize: Int
  notifyOnJobComplete: Boolean
  notifyOnJobFailed: Boolean
  notifyOnWorkerOffline: Boolean
}

"""
Metrics Report Input (from workers)
"""
input MetricsReportInput {
  jobId: ID!
  workerId: ID!
  batchId: String!
  epoch: Int!
  
  # Training Metrics
  loss: Float!
  accuracy: Float
  learningRate: Float!
  
  # Performance
  samplesProcessed: Int!
  batchTime: Float!
  
  # Gradients
  gradientNorm: Float
  weightNorm: Float
  
  # System Metrics
  cpuUsage: Float!
  memoryUsage: Float!
  gpuUsage: Float
}

# ============================================================================
# Enums
# ============================================================================

"""
Job Status
"""
enum JobStatus {
  PENDING       # Created, waiting for dataset sharding
  SHARDING      # Dataset being split into batches
  READY         # Ready to start, waiting for workers
  RUNNING       # Currently training
  PAUSED        # Temporarily paused by user
  COMPLETED     # Successfully completed
  FAILED        # Failed due to error
  CANCELLED     # Cancelled by user
}

"""
Worker Status
"""
enum WorkerStatus {
  IDLE          # Registered, waiting for task
  BUSY          # Currently processing batch
  OFFLINE       # Not responding to heartbeat
  FAILED        # Encountered error
  DRAINING      # Finishing current task, won't accept new ones
}

"""
Worker Type
"""
enum WorkerType {
  PYTHON        # Python worker (PyTorch)
  CPP           # C++ worker (LibTorch)
  JAVASCRIPT    # JavaScript worker (ONNX.js / TensorFlow.js)
  MOBILE        # Mobile worker (iOS/Android)
}

"""
Model Status
"""
enum ModelStatus {
  VALIDATING    # Being validated
  VALID         # Valid and ready to use
  INVALID       # Validation failed
  ARCHIVED      # No longer active
}

"""
Model Architecture
"""
enum ModelArchitecture {
  CNN           # Convolutional Neural Network
  RNN           # Recurrent Neural Network
  TRANSFORMER   # Transformer-based
  LSTM          # Long Short-Term Memory
  GAN           # Generative Adversarial Network
  AUTOENCODER   # Autoencoder
  CUSTOM        # Custom architecture
}

"""
Group Role
"""
enum GroupRole {
  OWNER         # Full permissions, can delete group
  ADMIN         # Can manage members and settings
  MEMBER        # Can create jobs and use resources
}

"""
Member Status
"""
enum MemberStatus {
  ACTIVE        # Active member
  SUSPENDED     # Temporarily suspended
  LEFT          # User left the group
}

"""
Invitation Status
"""
enum InvitationStatus {
  PENDING       # Awaiting response
  ACCEPTED      # Accepted
  DECLINED      # Declined by invitee
  EXPIRED       # Token expired
  CANCELLED     # Cancelled by inviter
}

"""
Health Status
"""
enum HealthStatus {
  HEALTHY       # All systems operational
  DEGRADED      # Some issues, but operational
  UNHEALTHY     # Major issues
  DOWN          # Service unavailable
}

"""
Metric Type
"""
enum MetricType {
  LOSS
  ACCURACY
  LEARNING_RATE
  BATCH_TIME
  THROUGHPUT
  GRADIENT_NORM
  WEIGHT_NORM
  CPU_USAGE
  MEMORY_USAGE
  GPU_USAGE
}

"""
Time Interval for aggregation
"""
enum TimeInterval {
  SECOND
  MINUTE
  HOUR
  DAY
}

# ============================================================================
# Connection Types (for pagination)
# ============================================================================

"""
Job Connection
"""
type JobConnection {
  edges: [JobEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type JobEdge {
  node: Job!
  cursor: String!
}

"""
Worker Connection
"""
type WorkerConnection {
  edges: [WorkerEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type WorkerEdge {
  node: Worker!
  cursor: String!
}

"""
Group Connection
"""
type GroupConnection {
  edges: [GroupEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type GroupEdge {
  node: Group!
  cursor: String!
}

"""
Page Info for pagination
"""
type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

# ============================================================================
# Scalar Types
# ============================================================================

"""
DateTime scalar (ISO 8601 format)
Example: 2026-03-04T10:30:00Z
"""
scalar DateTime

"""
JSON scalar for arbitrary JSON data
"""
scalar JSON
