name: CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/**'
      - 'workers/python-worker/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/**'
      - 'workers/python-worker/**'
      - '.github/workflows/ci.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - services/api-gateway
          - services/model-registry
          - services/dataset-sharder
          - services/task-orchestrator
          - services/parameter-server
          - services/metrics-service
          - workers/python-worker

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: |
          python -m pip install --upgrade pip
          pip install black flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -r requirements-test.txt

      - name: Run black check
        working-directory: ${{ matrix.component }}
        run: |
          if [ -d app ]; then
            black --check app tests
          else
            black --check meshml_worker tests
          fi

      - name: Run flake8
        working-directory: ${{ matrix.component }}
        run: |
          if [ -d app ]; then
            flake8 --max-line-length 100 app tests
          else
            flake8 --max-line-length 100 meshml_worker tests
          fi

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - services/api-gateway
          - services/model-registry
          - services/dataset-sharder
          - services/task-orchestrator
          - services/parameter-server
          - services/metrics-service
          - workers/python-worker

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -r requirements-test.txt

      - name: Run pytest
        working-directory: ${{ matrix.component }}
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          REDIS_HOST: test-redis
          REDIS_URL: redis://test-redis:6379/0
          GRPC_TARGET: test-grpc:50051
        run: pytest -q
