name: C++ Worker Tests

on:
  push:
    paths:
      - 'workers/cpp-worker/**'
      - '.github/workflows/cpp-worker-tests.yml'
  pull_request:
    paths:
      - 'workers/cpp-worker/**'
      - '.github/workflows/cpp-worker-tests.yml'

jobs:
  test:
    name: ${{ matrix.os }} - ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Debug, Release]
        include:
          - os: ubuntu-latest
            install_cmd: |
              sudo apt-get update
              sudo apt-get install -y \
                libgtest-dev \
                cmake \
                ninja-build \
                libprotobuf-dev \
                protobuf-compiler \
                libgrpc++-dev \
                libgrpc-dev
          - os: macos-latest
            install_cmd: |
              brew install \
                googletest \
                cmake \
                ninja \
                protobuf \
                grpc
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install dependencies
        run: ${{ matrix.install_cmd }}
      
      - name: Configure CMake
        working-directory: workers/cpp-worker
        run: |
          mkdir -p build
          cd build
          cmake \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DBUILD_TESTS=ON \
            -DDOWNLOAD_LIBTORCH=ON \
            ..
      
      - name: Build
        working-directory: workers/cpp-worker/build
        run: ninja -j $(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)
      
      - name: Run tests
        working-directory: workers/cpp-worker/build
        run: ctest --output-on-failure --verbose
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.build_type }}
          path: workers/cpp-worker/build/Testing/
  
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtest-dev \
            cmake \
            ninja-build \
            libprotobuf-dev \
            protobuf-compiler \
            libgrpc++-dev \
            libgrpc-dev \
            lcov
      
      - name: Configure CMake with coverage
        working-directory: workers/cpp-worker
        run: |
          mkdir -p build
          cd build
          cmake \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=ON \
            -DDOWNLOAD_LIBTORCH=ON \
            -DCMAKE_CXX_FLAGS="--coverage" \
            ..
      
      - name: Build
        working-directory: workers/cpp-worker/build
        run: ninja
      
      - name: Run tests
        working-directory: workers/cpp-worker/build
        run: ctest --output-on-failure
      
      - name: Generate coverage report
        working-directory: workers/cpp-worker/build
        run: |
          lcov --directory . --capture --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '*/tests/*' '*/build/*' --output-file coverage.info.cleaned
          lcov --list coverage.info.cleaned
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: workers/cpp-worker/build/coverage.info.cleaned
          flags: cpp-worker
          name: cpp-worker-coverage
  
  cuda-test:
    name: CUDA Tests
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:11.8.0-devel-ubuntu22.04
    
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            libgtest-dev \
            cmake \
            ninja-build \
            libprotobuf-dev \
            protobuf-compiler \
            libgrpc++-dev \
            libgrpc-dev \
            wget
      
      - name: Configure CMake with CUDA
        working-directory: workers/cpp-worker
        run: |
          mkdir -p build
          cd build
          cmake \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON \
            -DUSE_CUDA=ON \
            -DDOWNLOAD_LIBTORCH=ON \
            ..
      
      - name: Build
        working-directory: workers/cpp-worker/build
        run: ninja
      
      - name: Run CUDA tests
        working-directory: workers/cpp-worker/build
        run: ./tests/meshml_tests --gtest_filter=CudaKernelsTest.*
