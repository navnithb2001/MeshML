# Prometheus Configuration for MeshML

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'meshml'
    environment: 'development'

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Scrape configurations
scrape_configs:
  # API Gateway
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8000']
    metrics_path: '/metrics'

  # Model Registry
  - job_name: 'model-registry'
    static_configs:
      - targets: ['model-registry:8004']
    metrics_path: '/metrics'

  # Dataset Sharder
  - job_name: 'dataset-sharder'
    static_configs:
      - targets: ['dataset-sharder:8001']
    metrics_path: '/metrics'

  # Task Orchestrator
  - job_name: 'task-orchestrator'
    static_configs:
      - targets: ['task-orchestrator:8002']
    metrics_path: '/metrics'

  # Parameter Server
  - job_name: 'parameter-server'
    static_configs:
      - targets: ['parameter-server:8003']
    metrics_path: '/metrics'

  # PostgreSQL (if postgres_exporter is added)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  # Redis (if redis_exporter is added)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
