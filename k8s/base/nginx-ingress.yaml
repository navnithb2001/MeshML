apiVersion: apps/v1
kind: Deployment
metadata:
  name: meshml-ingress
  namespace: meshml
  labels:
    app: meshml-ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meshml-ingress
  template:
    metadata:
      labels:
        app: meshml-ingress
    spec:
      containers:
      - name: proxy
        image: us-central1-docker.pkg.dev/meshml-platform/meshml-repo/meshml-proxy:latest
        imagePullPolicy: Always
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        env:
        - name: API_GATEWAY_HOST
          value: "api-gateway-service.meshml.svc.cluster.local"
        - name: DATASET_SHARDER_HOST
          value: "dataset-sharder-service.meshml.svc.cluster.local"
        - name: TASK_ORCHESTRATOR_HOST
          value: "task-orchestrator-service.meshml.svc.cluster.local"
        - name: PARAMETER_SERVER_HOST
          value: "parameter-server-service.meshml.svc.cluster.local"
        - name: MODEL_REGISTRY_HOST
          value: "model-registry-service.meshml.svc.cluster.local"
        - name: METRICS_SERVICE_HOST
          value: "metrics-service.meshml.svc.cluster.local"
        ports:
        - containerPort: 8000
        - containerPort: 8001
        - containerPort: 8002
        - containerPort: 8003
        - containerPort: 8004
        - containerPort: 8005
        - containerPort: 50051
        - containerPort: 50052
        - containerPort: 50053
        - containerPort: 50054
        - containerPort: 50055
---
apiVersion: v1
kind: Service
metadata:
  name: meshml-ingress-service
  namespace: meshml
  labels:
    app: meshml-ingress
spec:
  type: LoadBalancer
  selector:
    app: meshml-ingress
  ports:
  - name: api-gateway
    port: 8000
    targetPort: 8000
  - name: sharder
    port: 8001
    targetPort: 8001
  - name: orchestrator-http
    port: 8002
    targetPort: 8002
  - name: param-server
    port: 8003
    targetPort: 8003
  - name: model-registry
    port: 8004
    targetPort: 8004
  - name: metrics
    port: 8005
    targetPort: 8005
  - name: orchestrator-grpc
    port: 50051
    targetPort: 50051
  - name: registry-grpc
    port: 50052
    targetPort: 50052
  - name: sharder-grpc
    port: 50053
    targetPort: 50053
  - name: param-server-grpc
    port: 50054
    targetPort: 50054
  - name: metrics-grpc
    port: 50055
    targetPort: 50055
