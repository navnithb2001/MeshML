apiVersion: apps/v1
kind: Deployment
metadata:
  name: parameter-server
  namespace: meshml
  labels:
    app: parameter-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parameter-server
  template:
    metadata:
      labels:
        app: parameter-server
    spec:
      containers:
      - name: parameter-server
        image: us-central1-docker.pkg.dev/meshml-platform/meshml-repo/parameter-server:latest
        ports:
        - containerPort: 8003
          name: http
        - containerPort: 50054
          name: grpc
        envFrom:
        - configMapRef:
            name: meshml-config
        - secretRef:
            name: meshml-secrets
        env:
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /var/secrets/gcs/key.json
        volumeMounts:
        - name: gcs-signing-key
          mountPath: /var/secrets/gcs
          readOnly: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 120
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 90
          periodSeconds: 5
      volumes:
      - name: gcs-signing-key
        secret:
          secretName: gcs-signing-key

---
apiVersion: v1
kind: Service
metadata:
  name: parameter-server-service
  namespace: meshml
  labels:
    app: parameter-server
spec:
  type: ClusterIP
  ports:
  - port: 8003
    targetPort: 8003
    protocol: TCP
    name: http
  - port: 50054
    targetPort: 50054
    protocol: TCP
    name: grpc
  selector:
    app: parameter-server
