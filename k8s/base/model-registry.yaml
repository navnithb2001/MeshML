apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-registry
  namespace: meshml
  labels:
    app: model-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-registry
  template:
    metadata:
      labels:
        app: model-registry
    spec:
      containers:
      - name: model-registry
        image: us-central1-docker.pkg.dev/meshml-platform/meshml-repo/model-registry:latest
        ports:
        - containerPort: 8004
          name: http
        - containerPort: 50052
          name: grpc
        envFrom:
        - configMapRef:
            name: meshml-config
        - secretRef:
            name: meshml-secrets
        env:
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /var/secrets/gcs/key.json
        volumeMounts:
        - name: gcs-signing-key
          mountPath: /var/secrets/gcs
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 120
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 90
          periodSeconds: 5
      volumes:
      - name: gcs-signing-key
        secret:
          secretName: gcs-signing-key

---
apiVersion: v1
kind: Service
metadata:
  name: model-registry-service
  namespace: meshml
  labels:
    app: model-registry
spec:
  type: ClusterIP
  ports:
  - port: 8004
    targetPort: 8004
    protocol: TCP
    name: http
  - port: 50052
    targetPort: 50052
    protocol: TCP
    name: grpc
  selector:
    app: model-registry
