apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-orchestrator
  namespace: meshml
  labels:
    app: task-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-orchestrator
  template:
    metadata:
      labels:
        app: task-orchestrator
    spec:
      containers:
      - name: task-orchestrator
        image: us-central1-docker.pkg.dev/meshml-platform/meshml-repo/task-orchestrator:latest
        ports:
        - containerPort: 8002
          name: http
        - containerPort: 50051
          name: grpc
        envFrom:
        - configMapRef:
            name: meshml-config
        - secretRef:
            name: meshml-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "20m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 120
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 90
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: task-orchestrator-service
  namespace: meshml
  labels:
    app: task-orchestrator
spec:
  type: ClusterIP
  ports:
  - port: 8002
    targetPort: 8002
    protocol: TCP
    name: http
  - port: 50051
    targetPort: 50051
    protocol: TCP
    name: grpc
  selector:
    app: task-orchestrator
