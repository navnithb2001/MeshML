apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataset-sharder
  namespace: meshml
  labels:
    app: dataset-sharder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dataset-sharder
  template:
    metadata:
      labels:
        app: dataset-sharder
    spec:
      containers:
      - name: dataset-sharder
        image: us-central1-docker.pkg.dev/meshml-platform/meshml-repo/dataset-sharder:latest
        ports:
        - containerPort: 8001
          name: http
        - containerPort: 50053
          name: grpc
        envFrom:
        - configMapRef:
            name: meshml-config
        - secretRef:
            name: meshml-secrets
        env:
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /var/secrets/gcs/key.json
        volumeMounts:
        - name: gcs-signing-key
          mountPath: /var/secrets/gcs
          readOnly: true
        resources:
          requests:
            memory: "1Gi"
            cpu: "900m"
          limits:
            memory: "2Gi"
            cpu: "1500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 360
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 270
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: gcs-signing-key
        secret:
          secretName: gcs-signing-key

---
apiVersion: v1
kind: Service
metadata:
  name: dataset-sharder-service
  namespace: meshml
  labels:
    app: dataset-sharder
spec:
  type: ClusterIP
  ports:
  - port: 8001
    targetPort: 8001
    protocol: TCP
    name: http
  - port: 50053
    targetPort: 50053
    protocol: TCP
    name: grpc
  selector:
    app: dataset-sharder
