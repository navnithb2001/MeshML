syntax = "proto3";

package meshml.proto;

// Worker metadata
message WorkerInfo {
  string worker_id = 1;
  string worker_type = 2;  // "python" or "cpp"
  string device = 3;  // "cpu", "cuda", "mps"
  int64 memory_mb = 4;
  int32 cpu_cores = 5;
  string version = 6;
}

// Training job information
message JobInfo {
  string job_id = 1;
  string model_name = 2;
  int64 total_samples = 3;
  int32 batch_size = 4;
  int32 num_epochs = 5;
}

// Heartbeat message
message HeartbeatRequest {
  WorkerInfo worker = 1;
  JobInfo job = 2;
  int64 iteration = 3;
  double current_loss = 4;
  double current_accuracy = 5;
  int64 timestamp = 6;
}

message HeartbeatResponse {
  bool success = 1;
  string message = 2;
  bool should_continue = 3;  // Server can signal worker to stop
  int64 server_timestamp = 4;
}

// Tensor data
message TensorData {
  repeated int64 shape = 1;
  bytes data = 2;  // Raw binary tensor data
  string dtype = 3;  // "float32", "float64", "int32", etc.
  bool compressed = 4;  // Whether data is compressed
  string compression_method = 5;  // "zlib", "gzip", etc.
}

// Gradient update
message GradientUpdate {
  string worker_id = 1;
  string job_id = 2;
  int64 iteration = 3;
  map<string, TensorData> gradients = 4;  // parameter_name -> gradient
  int64 timestamp = 5;
  int32 batch_size = 6;
}

message GradientUpdateResponse {
  bool success = 1;
  string message = 2;
  int64 global_iteration = 3;
}

// Parameter pull request
message ParameterRequest {
  string worker_id = 1;
  string job_id = 2;
  repeated string parameter_names = 3;  // Empty = all parameters
  int64 timestamp = 4;
}

message ParameterResponse {
  bool success = 1;
  string message = 2;
  map<string, TensorData> parameters = 3;
  int64 version = 4;
  int64 timestamp = 5;
}

// Worker registration
message RegisterRequest {
  WorkerInfo worker = 1;
  int64 timestamp = 2;
}

message RegisterResponse {
  bool success = 1;
  string message = 2;
  string assigned_worker_id = 3;
  int64 timestamp = 4;
}

// Worker deregistration
message DeregisterRequest {
  string worker_id = 1;
  int64 timestamp = 2;
}

message DeregisterResponse {
  bool success = 1;
  string message = 2;
}

// Parameter Server service
service ParameterServer {
  // Worker lifecycle
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Deregister(DeregisterRequest) returns (DeregisterResponse);
  
  // Heartbeat
  rpc SendHeartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  
  // Parameter synchronization
  rpc PushGradients(GradientUpdate) returns (GradientUpdateResponse);
  rpc PullParameters(ParameterRequest) returns (ParameterResponse);
}
