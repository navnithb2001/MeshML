# MeshML C++ Worker Configuration

worker:
  worker_id: worker-001
  worker_name: "Desktop Worker"
  worker_type: cpp
  max_memory_mb: 8192
  max_cpu_cores: 8
  enable_simd: true
  enable_memory_pool: true
  enable_profiling: false

training:
  model_name: "mnist_cnn"
  model_type: "cnn"
  learning_rate: 0.001
  batch_size: 64
  num_epochs: 20
  optimizer: adam
  weight_decay: 0.0001
  momentum: 0.9

  # Data loading
  data_path: "/data/mnist"
  num_workers: 4
  shuffle: true
  pin_memory: true

  # Device settings
  device: cuda  # Options: cpu, cuda, mps
  mixed_precision: true

  # Checkpointing
  checkpoint_dir: "./checkpoints"
  checkpoint_interval: 100
  save_best_only: true

  # Logging
  log_interval: 10
  verbose: true

  # Parameter Server
  ps_host: localhost
  ps_port: 50051
  heartbeat_interval: 5
  compression_enabled: true
  compression_threshold: 0.1
